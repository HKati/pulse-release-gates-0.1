name: EPF experiment (shadow)

on:
  pull_request:
    paths:
      - ".github/workflows/epf_experiment.yml"
      - "PULSE_safe_pack_v0/**"
      - "tools/**"
      - "scripts/**"
      - "pulse_gates.yaml"
      - "schemas/epf_paradox_summary_v0.schema.json"
      - "tests/fixtures/epf_paradox_summary_v0/**"
      - "tests/test_check_epf_paradox_summary_contract.py"

  push:
    branches: ["main"]
    paths:
      - ".github/workflows/epf_experiment.yml"
      - "PULSE_safe_pack_v0/**"
      - "tools/**"
      - "scripts/**"
      - "pulse_gates.yaml"
      - "schemas/epf_paradox_summary_v0.schema.json"
      - "tests/fixtures/epf_paradox_summary_v0/**"
      - "tests/test_check_epf_paradox_summary_contract.py"

  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ab-run:
    concurrency:
      group: epf-shadow-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install deps (PULSE pack if available, else minimal)
        id: deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -U pip
          deps_rc=0
          if [ -f PULSE_safe_pack_v0/requirements.txt ]; then
            echo "Installing PULSE_safe_pack_v0 requirements..."
            set +e
            python -m pip install -r PULSE_safe_pack_v0/requirements.txt
            deps_rc=$?
            set -e
          else
            echo "No PULSE_safe_pack_v0/requirements.txt, installing minimal deps..."
            set +e
            python -m pip install numpy 'jsonschema>=4,<5'
            deps_rc=$?
            set -e
          fi
          echo "rc=$deps_rc" >> "$GITHUB_OUTPUT"
          if [ "$deps_rc" -ne 0 ]; then
            echo "::warning::Dependency install failed (rc=$deps_rc). Continuing in stub/best-effort mode."
          fi

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install pytest

      - name: Run EPF paradox summary contract tests
        shell: bash
        run: |
          set -euo pipefail
          pytest -q tests/test_check_epf_paradox_summary_contract.py

      - name: Prepare shared input from PULSE pack baseline (core mode) or stub
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          runall_rc=0
          if [ -f PULSE_safe_pack_v0/tools/run_all.py ]; then
            echo "Running PULSE_safe_pack_v0/tools/run_all.py --mode core to produce baseline status.json..."
            set +e
            python PULSE_safe_pack_v0/tools/run_all.py --mode core
            runall_rc=$?
            set -e
            if [ "$runall_rc" -ne 0 ]; then
              echo "::warning::run_all.py exited non-zero (rc=$runall_rc). Will use stub if status.json is missing."
            fi
            if [ -f PULSE_safe_pack_v0/artifacts/status.json ]; then
              cp PULSE_safe_pack_v0/artifacts/status.json status.json
              echo "Using PULSE_safe_pack_v0/artifacts/status.json as shared input"
            else
              echo "::warning::status.json not found after run_all.py; using v1-shaped stub status.json"
              printf '%s\n' '{"version":"1.0.0-shadow-stub","created_utc":"1970-01-01T00:00:00Z","metrics":{"run_mode":"core"},"gates":{}}' > status.json
            fi
          else
            echo "::warning::PULSE_safe_pack_v0/tools/run_all.py not found; using v1-shaped stub status.json"
            printf '%s\n' '{"version":"1.0.0-shadow-stub","created_utc":"1970-01-01T00:00:00Z","metrics":{"run_mode":"core"},"gates":{}}' > status.json
          fi
          echo "runall_rc=$runall_rc" >> "$GITHUB_OUTPUT"

      - name: Baseline (diagnostic compare branch) or stub
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ -f status.json ]; then
            cp status.json status_baseline.json
          else
            printf '%s\n' '{"version":"1.0.0-shadow-stub","created_utc":"1970-01-01T00:00:00Z","metrics":{"run_mode":"core"},"gates":{}}' > status_baseline.json
          fi

          if [ ! -f pulse_gates.yaml ]; then
            echo "::warning::pulse_gates.yaml not found; baseline compare branch will stay in stub mode."
            echo "rc=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rc=0
          if [ -f scripts/check_gates.py ]; then
            echo "Running baseline compare branch via scripts/check_gates.py ..."
            set +e
            python scripts/check_gates.py \
              --config pulse_gates.yaml \
              --status status_baseline.json \
              --defer-policy fail
            rc=$?
            set -e
          else
            echo "::warning::scripts/check_gates.py not found; keeping baseline artifact as shared-input copy."
            rc=0
          fi

          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "::warning::Baseline compare branch exited non-zero (rc=$rc)."
          fi

      - name: EPF shadow run (non-blocking) or stub
        id: epf
        shell: bash
        run: |
          set -euo pipefail
          if [ -f status.json ]; then
            cp status.json status_epf.json
          else
            printf '%s\n' '{"version":"1.0.0-shadow-stub","created_utc":"1970-01-01T00:00:00Z","metrics":{"run_mode":"core"},"gates":{}}' > status_epf.json
          fi

          if [ ! -f pulse_gates.yaml ]; then
            echo "::warning::pulse_gates.yaml not found; EPF shadow branch will stay in stub mode."
            echo "rc=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rc=0
          if [ -f scripts/check_gates.py ]; then
            echo "Running EPF shadow compare branch via scripts/check_gates.py ..."
            set +e
            python scripts/check_gates.py \
              --config pulse_gates.yaml \
              --status status_epf.json \
              --epf-shadow \
              --seed 1737 \
              --defer-policy warn
            rc=$?
            set -e
          else
            echo "::warning::scripts/check_gates.py not found; keeping EPF artifact as shared-input copy."
            rc=0
          fi

          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "::warning::EPF compare branch exited non-zero (rc=$rc)."
          fi

      - name: Compare diagnostic outputs and summarize
        shell: bash
        env:
          DEPS_RC: ${{ steps.deps.outputs.rc }}
          RUNALL_RC: ${{ steps.prepare.outputs.runall_rc }}
          BASE_RC: ${{ steps.base.outputs.rc }}
          EPF_RC: ${{ steps.epf.outputs.rc }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib

          def load_json(path, default):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return json.load(f)
              except Exception:
                  return default

          baseline = load_json("status_baseline.json", {})
          epf = load_json("status_epf.json", {})

          baseline_decisions = baseline.get("decisions", {}) or {}
          epf_shadow = (epf.get("experiments", {}) or {}).get("epf", {}) or {}

          epf_decisions = {}
          for k, v in epf_shadow.items():
              if isinstance(v, dict):
                  dec = v.get("decision", v.get("status", v))
              else:
                  dec = v
              epf_decisions[k] = dec

          diffs = []
          for k, v in baseline_decisions.items():
              dv = epf_decisions.get(k, None)
              if dv is not None and dv != v:
                  diffs.append((k, v, dv))

          deps_rc = os.environ.get("DEPS_RC", "")
          runall_rc = os.environ.get("RUNALL_RC", "")
          base_rc = os.environ.get("BASE_RC", "")
          epf_rc = os.environ.get("EPF_RC", "")

          summary = ""
          summary += f"Deps install rc: {deps_rc}\n"
          summary += f"run_all.py rc: {runall_rc}\n"
          summary += f"baseline compare rc: {base_rc}\n"
          summary += f"epf compare rc: {epf_rc}\n"
          summary += "\n"
          summary += "This workflow is diagnostic / CI-neutral.\n"
          summary += "The repository's release authority remains the final status.json + required gate enforcement path.\n"
          summary += "\n"
          summary += f"Total baseline compare decisions: {len(baseline_decisions)}\n"
          summary += f"Changed (baseline->EPF): {len(diffs)}\n"
          for k, ba, ep in diffs[:20]:
              summary += f"- {k}: {ba} -> {ep}\n"

          pathlib.Path("epf_report.txt").write_text(summary, encoding="utf-8")
          print(summary)

          paradox = {
              "deps_rc": deps_rc,
              "runall_rc": runall_rc,
              "baseline_rc": base_rc,
              "epf_rc": epf_rc,
              "total_gates": len(baseline_decisions),
              "changed": len(diffs),
              "examples": [
                  {"gate": k, "baseline": ba, "epf": ep}
                  for k, ba, ep in diffs[:5]
              ],
          }
          pathlib.Path("epf_paradox_summary.json").write_text(
              json.dumps(paradox, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          {
            echo "### EPF Shadow Summary"
            echo '```'
            cat epf_report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f epf_paradox_summary.json ]; then
            changed="$(python - <<'PY'
          import json
          try:
              with open("epf_paradox_summary.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
          except Exception:
              data = {}
          print(data.get("changed", 0))
          PY
            )"
            if [ "$changed" -gt 0 ] 2>/dev/null; then
              echo "⚠️ EPF shadow detected ${changed} diagnostic decision delta(s) versus the baseline compare branch." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "✅ EPF shadow run: no diagnostic decision deltas detected." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Validate produced EPF paradox summary artifact
        shell: bash
        run: |
          set -euo pipefail
          python PULSE_safe_pack_v0/tools/check_epf_paradox_summary_contract.py \
            --input epf_paradox_summary.json \
            --output epf_paradox_summary_contract_check.json

      - name: Validate EPF checker output surface
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("epf_paradox_summary_contract_check.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          if data.get("ok") is not True:
              raise SystemExit("EPF paradox summary contract check did not succeed")

          if data.get("total_gates") is None:
              raise SystemExit("expected total_gates in EPF contract check output")

          if data.get("changed") is None:
              raise SystemExit("expected changed in EPF contract check output")
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: epf-ab-artifacts
          if-no-files-found: warn
          path: |
            status.json
            status_baseline.json
            status_epf.json
            epf_report.txt
            epf_paradox_summary.json
            epf_paradox_summary_contract_check.json
