name: Link check

on:
  pull_request:
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "examples/**"
      - "CITATION.cff"
      - "schemas/**"
      - ".github/workflows/link-check.yml"
      - ".lycheeignore"
      - "lychee.toml"
      - ".github/config/lychee.toml"

  push:
    branches: [ main ]
    paths:
      - "README.md"
      - "CHANGELOG.md"
      - "docs/**"
      - "examples/**"
      - "CITATION.cff"
      - "schemas/**"
      - ".github/workflows/link-check.yml"
      - ".lycheeignore"
      - "lychee.toml"
      - ".github/config/lychee.toml"

  workflow_dispatch: {}

  schedule:
    - cron: "0 3 * * 1" # every Monday 03:00 UTC

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,301,302,303,307,308,429
            --exclude "https://www\.kaggle\.com/.*"
            --exclude "^mailto:"
            --timeout 20
            --max-redirects 10
            --max-retries 2
            --retry-wait-time 2
            --max-concurrency 8
            README.md CHANGELOG.md docs examples CITATION.cff schemas
          format: markdown
          output: lychee_report.md
          # Advisory on PR/push; strict on schedule/manual runs.
          fail: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          failIfEmpty: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload lychee report (artifact)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lychee-report
          path: lychee_report.md
          if-no-files-found: ignore

      - name: Workflow summary (lychee excerpt)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "## Link check (lychee)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f lychee_report.md ]; then
            echo "### Report (excerpt)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,200p' lychee_report.md >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No lychee_report.md generated._" >> "$GITHUB_STEP_SUMMARY"
          fi
