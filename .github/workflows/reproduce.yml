name: Reproduce & checksums

on:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: do NOT write back to the repo from CI.
permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install deps (best effort)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi

      - name: Reproduce (best effort)
        shell: bash
        run: |
          set -euo pipefail
          if make -v >/dev/null 2>&1; then
            make reproduce || true
          fi

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          python compute_checksums.py dist artifacts > checksums.txt || echo "# WARN: no artifacts" > checksums.txt
          echo "---- checksums.txt (head) ----"
          head -n 20 checksums.txt || true
          echo "------------------------------"

      - name: Upload checksums (artifact)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproduce-checksums
          if-no-files-found: warn
          path: |
            checksums.txt
            dist/**
            artifacts/**
