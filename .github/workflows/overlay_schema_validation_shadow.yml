name: Overlay schema validation (shadow)

on:
  workflow_dispatch: {}
  push:
    paths:
      - "schemas/**"
      - "schemas/schemas/**"
      - "scripts/validate_overlays.py"
      - "PULSE_safe_pack_v0/artifacts/**"
      - "*.json"
      - ".github/workflows/overlay_schema_validation_shadow.yml"

permissions:
  contents: read

concurrency:
  group: overlay-schema-validation-shadow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  overlay-schema-validation-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install jsonschema
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install 'jsonschema>=4,<5'

      - name: Validate overlays against JSON Schemas
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "scripts/validate_overlays.py" ]; then
            echo "::error::scripts/validate_overlays.py not found."
            exit 1
          fi
          python scripts/validate_overlays.py --root .

