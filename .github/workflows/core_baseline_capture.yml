name: Core Baseline Capture

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install minimal Python deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate normalized core baseline files
        shell: bash
        run: |
          set -euo pipefail
          python tests/tools/generate_core_baseline_v0.py --write-golden
          echo "Generated files:"
          find tests/fixtures/core_baseline_v0 -maxdepth 1 -type f | sort

      - name: Upload core baseline artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-baseline-v0
          if-no-files-found: error
          path: |
            tests/fixtures/core_baseline_v0/status.normalized.json
            tests/fixtures/core_baseline_v0/junit.normalized.xml
            tests/fixtures/core_baseline_v0/sarif.normalized.json
