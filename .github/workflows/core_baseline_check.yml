name: Core Baseline Check

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - ".github/workflows/core_baseline_check.yml"
      - "tests/test_core_baseline_v0.py"
      - "tests/tools/generate_core_baseline_v0.py"
      - "tests/fixtures/core_baseline_v0/**"
      - "PULSE_safe_pack_v0/**"
      - "tools/validate_status_schema.py"
      - "schemas/status/**"
      - "pulse_gate_policy_v0.yml"
      - "requirements.txt"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/core_baseline_check.yml"
      - "tests/test_core_baseline_v0.py"
      - "tests/tools/generate_core_baseline_v0.py"
      - "tests/fixtures/core_baseline_v0/**"
      - "PULSE_safe_pack_v0/**"
      - "tools/validate_status_schema.py"
      - "schemas/status/**"
      - "pulse_gate_policy_v0.yml"
      - "requirements.txt"
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install minimal deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run core baseline check
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_core_baseline_v0.py
