          path: |
            ${{ env.PACK_DIR }}/artifacts/status.json
            ${{ env.PACK_DIR }}/artifacts/release_decision_v0.json
            ${{ env.PACK_DIR }}/artifacts/release_decision_v0_ledger_section.html
            ${{ env.PACK_DIR }}/artifacts/report_card.with_release_decision.html
      
      - name: "Release decision v0: summarize artifact"
        if: always()
        shell: bash
        env:
          RELEASE_DECISION_PATH: ${{ env.PACK_DIR }}/artifacts/release_decision_v0.json
        run: |
          set -euo pipefail

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path
          from typing import Any


          decision_path = Path(os.environ["RELEASE_DECISION_PATH"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])


          def _safe_text(value: Any) -> str:
              if value is None:
                  return "missing"
              text = str(value)
              return text.replace("\n", " ").replace("\r", " ").strip()


          def _list_text(value: Any) -> str:
              if isinstance(value, list):
                  if not value:
                      return "none"
                  return ", ".join(_safe_text(item) for item in value)
              if value is None:
                  return "missing"
              return _safe_text(value)


          def _write_summary(markdown: str) -> None:
              with summary_path.open("a", encoding="utf-8") as f:
                  f.write(markdown.rstrip() + "\n")


          lines: list[str] = []
          lines.append("### Release decision v0 summary")
          lines.append("")

          if not decision_path.exists():
              print(f"::warning::release_decision_v0 artifact missing: {decision_path}")
              lines.append("- status: `missing`")
              lines.append(f"- artifact: `{decision_path}`")
              lines.append("")
              lines.append("The workflow did not find a materialized release decision artifact.")
              _write_summary("\n".join(lines))
              raise SystemExit(0)

          try:
              payload = json.loads(decision_path.read_text(encoding="utf-8"))
          except Exception as exc:
              print(f"::warning::release_decision_v0 artifact is not valid JSON: {exc}")
              lines.append("- status: `invalid-json`")
              lines.append(f"- artifact: `{decision_path}`")
              lines.append(f"- error: `{_safe_text(exc)}`")
              _write_summary("\n".join(lines))
              raise SystemExit(0)

          if not isinstance(payload, dict):
              print("::warning::release_decision_v0 artifact root is not an object")
              lines.append("- status: `invalid-root`")
              lines.append(f"- artifact: `{decision_path}`")
              _write_summary("\n".join(lines))
              raise SystemExit(0)

          conditions = payload.get("conditions")
          if not isinstance(conditions, dict):
              conditions = {}

          blocking_reasons = payload.get("blocking_reasons")
          if not isinstance(blocking_reasons, list):
              blocking_reasons = []

          decision_basis = payload.get("decision_basis")
          if not isinstance(decision_basis, list):
              decision_basis = []

          release_level = _safe_text(payload.get("release_level"))
          target = _safe_text(payload.get("target"))
          run_mode = _safe_text(payload.get("run_mode"))
          required_gates_passed = _safe_text(payload.get("required_gates_passed"))

          lines.append(f"- artifact: `{decision_path}`")
          lines.append(f"- release level: `{release_level}`")
          lines.append(f"- target: `{target}`")
          lines.append(f"- run mode: `{run_mode}`")
          lines.append(f"- active gate sets: `{_list_text(payload.get('active_gate_sets'))}`")
          lines.append(f"- required gates passed: `{required_gates_passed}`")
          lines.append(
              f"- external evidence mode: "
              f"`{_safe_text(conditions.get('external_evidence_mode'))}`"
          )
          lines.append(f"- detectors materialized: `{_safe_text(conditions.get('detectors_materialized_ok'))}`")
          lines.append(f"- external summaries present: `{_safe_text(conditions.get('external_summaries_present'))}`")
          lines.append(f"- external all pass: `{_safe_text(conditions.get('external_all_pass'))}`")
          lines.append(f"- stubbed: `{_safe_text(conditions.get('stubbed'))}`")
          lines.append(f"- scaffold: `{_safe_text(conditions.get('scaffold'))}`")
          lines.append("")

          if blocking_reasons:
              lines.append("#### Blocking reasons")
              lines.append("")
              for reason in blocking_reasons[:10]:
                  lines.append(f"- {_safe_text(reason)}")
              if len(blocking_reasons) > 10:
                  lines.append(f"- ... {len(blocking_reasons) - 10} more")
              lines.append("")
          else:
              lines.append("Blocking reasons: `none`")
              lines.append("")

          if decision_basis:
              lines.append("#### Decision basis")
              lines.append("")
              for item in decision_basis[:8]:
                  lines.append(f"- {_safe_text(item)}")
              if len(decision_basis) > 8:
                  lines.append(f"- ... {len(decision_basis) - 8} more")
              lines.append("")

          lines.append(
              "> This summary is read-only. It does not replace `status.json`, "
              "`check_gates.py`, the materialized required gate set, or the primary "
              "release-gating workflow."
          )

          _write_summary("\n".join(lines))
          PY
      
      - name: Export JUnit and SARIF from final status
        if: always()
        shell: bash
        env:
          PULSE_EVENT_NAME: ${{ github.event_name }}
          PULSE_REF: ${{ github.ref }}
          PULSE_SHA: ${{ github.sha }}
          PULSE_PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          PULSE_IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.id != github.event.pull_request.base.repo.id || false }}
        run: |
          set -euo pipefail

          PACK_DIR="${PACK_DIR:-${GITHUB_WORKSPACE}/PULSE_safe_pack_v0}"
          if [[ ! -d "${PACK_DIR}" ]]; then
            echo "::error::PACK_DIR not found at ${PACK_DIR}"
            exit 1
          fi

          export PACK_DIR
          export PULSE_STATUS="${PACK_DIR}/artifacts/status.json"
          export PULSE_JUNIT="${PACK_DIR}/artifacts/reports/junit.xml"
          export PULSE_SARIF="${PACK_DIR}/artifacts/reports/sarif.json"

          mkdir -p "${PACK_DIR}/artifacts/reports" "${PACK_DIR}/artifacts/meta"

          python "${PACK_DIR}/tools/status_to_junit.py"

          POLICY_SET="${PULSE_POLICY_SET:-core_required}"
          REQ=()

          if REQ_STR="$(python tools/policy_to_require_args.py --policy pulse_gate_policy_v0.yml --set "$POLICY_SET" --format space 2>/dev/null)"; then
            if [[ -n "${REQ_STR}" ]]; then
              read -r -a REQ <<< "$REQ_STR"
            fi
          else
            echo "::warning::Failed to derive SARIF gate list for policy set '${POLICY_SET}'; exporting all gates."
          fi

          if [[ "${PULSE_IS_RELEASE:-0}" == "1" ]]; then
            if RELEASE_REQ_STR="$(python tools/policy_to_require_args.py --policy pulse_gate_policy_v0.yml --set release_required --format space 2>/dev/null)"; then
              if [[ -n "${RELEASE_REQ_STR}" ]]; then
                read -r -a RELEASE_REQ <<< "$RELEASE_REQ_STR"
                REQ+=("${RELEASE_REQ[@]}")
              else
                echo "::error::Derived release_required SARIF gate list is empty on a release-grade run."
                exit 1
              fi
            else
              echo "::error::Failed to derive release_required SARIF gate list."
              exit 1
            fi
          fi

          if (( ${#REQ[@]} > 0 )); then
            python "${PACK_DIR}/tools/status_to_sarif.py" --require "${REQ[@]}"
          else
            python "${PACK_DIR}/tools/status_to_sarif.py"
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          pr_number_raw = str(os.environ.get("PULSE_PR_NUMBER", "")).strip()
          pr_number = int(pr_number_raw) if pr_number_raw else None

          meta = {
              "event_name": os.environ["PULSE_EVENT_NAME"],
              "ref": os.environ["PULSE_REF"],
              "sha": os.environ["PULSE_SHA"],
              "pr_number": pr_number,
              "is_fork": str(os.environ.get("PULSE_IS_FORK", "false")).lower() == "true",
          }

          out = Path(os.environ["PACK_DIR"]) / "artifacts" / "meta" / "sarif_upload.json"
          out.write_text(json.dumps(meta, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"Wrote {out}")
          PY

      - name: Check release-grade reference run qualification (advisory)
        id: release_grade_reference_qualify
        if: ${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true') }}
        shell: bash
        run: |
          set -euo pipefail

          TOOL="${PACK_DIR}/tools/check_release_grade_reference_run_v0.py"
          STATUS="${PACK_DIR}/artifacts/status.json"
          MANIFEST="${PACK_DIR}/artifacts/release_authority_v0.json"
          REPORT="${PACK_DIR}/artifacts/report_card.html"
          AUDIT_BUNDLE="${PACK_DIR}/artifacts/release_authority_audit_bundle"

          set +e
          python "$TOOL" \
            --status "$STATUS" \
            --manifest "$MANIFEST" \
            --report "$REPORT" \
            --audit-bundle-dir "$AUDIT_BUNDLE"
          CHECK_RC=$?
          set -e

          if [[ "$CHECK_RC" -ne 0 ]]; then
            RESULT="Not qualified (advisory)"
            echo "::warning::release-grade reference qualification failed; release outcome unchanged"
            echo "REFERENCE_RUN_QUALIFIED=false" >> "$GITHUB_ENV"
            echo "qualified=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Release-grade reference run"
              echo
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Workflow path | \`${GITHUB_REF}\` / \`${GITHUB_EVENT_NAME}\` |"
              echo "| Active enforce set | \`required+release_required\` |"
              echo "| Qualification | \`${RESULT}\` |"
              echo "| Authority | Advisory / non-normative / non-blocking; release outcome unchanged |"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          RESULT="Qualified"
          echo "REFERENCE_RUN_QUALIFIED=true" >> "$GITHUB_ENV"
          echo "qualified=true" >> "$GITHUB_OUTPUT"

          {
            echo "### Release-grade reference run"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Workflow path | \`${GITHUB_REF}\` / \`${GITHUB_EVENT_NAME}\` |"
            echo "| Active enforce set | \`required+release_required\` |"
            echo "| Qualification | \`${RESULT}\` |"
            echo "| Authority | Advisory / non-normative / non-blocking; release outcome unchanged |"
          } >> "$GITHUB_STEP_SUMMARY"

          exit 0

      - name: Quality Ledger / status parity
        id: quality_ledger_status_parity
        if: ${{ always() && steps.quality_ledger_final_render.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          LEDGER="${{ env.PACK_DIR }}/artifacts/report_card.html"

          python "${{ env.PACK_DIR }}/tools/check_quality_ledger_status_parity.py" \
            --status "$STATUS" \
            --ledger "$LEDGER"

      - name: mark release-grade reference parity state
        if: ${{ always() }}
        shell: bash
        run: |
         if [[ "${{ steps.quality_ledger_status_parity.outcome }}" == "success" ]]; then
            echo "REFERENCE_LEDGER_PARITY_OK=true" >> "$GITHUB_ENV"
          else
            echo "REFERENCE_LEDGER_PARITY_OK=false" >> "$GITHUB_ENV"
          fi
      
      - name: assemble release-grade reference bundle
        if: ${{ (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true')) && env.REFERENCE_RUN_QUALIFIED == 'true' && env.REFERENCE_LEDGER_PARITY_OK == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_DIR="${RUNNER_TEMP}/release-grade-reference-run-v0"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR/artifacts" "$BUNDLE_DIR/reports"

          cp "${PACK_DIR}/artifacts/status.json" "$BUNDLE_DIR/artifacts/status.json"
          cp "${PACK_DIR}/artifacts/report_card.html" "$BUNDLE_DIR/artifacts/report_card.html"
          cp "${PACK_DIR}/artifacts/release_authority_v0.json" "$BUNDLE_DIR/artifacts/release_authority_v0.json"

          if [ -d "release-authority-audit-bundle" ]; then
            cp -a "release-authority-audit-bundle" "$BUNDLE_DIR/release-authority-audit-bundle"
          elif [ -d "${PACK_DIR}/artifacts/release_authority_audit_bundle" ]; then
            cp -a "${PACK_DIR}/artifacts/release_authority_audit_bundle" "$BUNDLE_DIR/release-authority-audit-bundle"
          fi

          shopt -s nullglob
          EXT_SUMMARIES=(
            "${PACK_DIR}"/artifacts/external/*_summary.json
            "${PACK_DIR}"/artifacts/external/*_summary.jsonl
          )
          if (( ${#EXT_SUMMARIES[@]} )); then
            mkdir -p "$BUNDLE_DIR/artifacts/external"
            cp "${EXT_SUMMARIES[@]}" "$BUNDLE_DIR/artifacts/external/"
          fi
          shopt -u nullglob

          if [ -f "reports/junit.xml" ]; then
            cp "reports/junit.xml" "$BUNDLE_DIR/reports/junit.xml"
          elif [ -f "${PACK_DIR}/artifacts/reports/junit.xml" ]; then
            cp "${PACK_DIR}/artifacts/reports/junit.xml" "$BUNDLE_DIR/reports/junit.xml"
          fi

          if [ -f "${PACK_DIR}/artifacts/reports/sarif.json" ]; then
            cp "${PACK_DIR}/artifacts/reports/sarif.json" "$BUNDLE_DIR/reports/sarif.json"
          elif [ -f "reports/sarif.json" ]; then
            cp "reports/sarif.json" "$BUNDLE_DIR/reports/sarif.json"
          fi 

          echo "REFERENCE_BUNDLE_DIR=${BUNDLE_DIR}" >> "$GITHUB_ENV"

      - name: upload release-grade reference bundle
        if: ${{ env.REFERENCE_BUNDLE_DIR != '' && env.REFERENCE_RUN_QUALIFIED == 'true' && env.REFERENCE_LEDGER_PARITY_OK == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-grade-reference-run-v0
          path: ${{ env.REFERENCE_BUNDLE_DIR }}
          if-no-files-found: error
          retention-days: 30
      
      - name: Upload artifacts
        if: ${{ always() && steps.quality_ledger_final_render.outcome == 'success' && steps.quality_ledger_status_parity.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned
        with:
          name: pulse-report
          if-no-files-found: warn
          path: |
            ${{ env.PACK_DIR }}/artifacts/**
            badges/*.svg
            reports/junit.xml
            reports/sarif.json

  attest_release_authority_artifact_binding:
    name: "Release authority artifact binding v0: attest"
    needs: pulse
    if: ${{ github.event_name != 'pull_request' && needs.pulse.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download verified release authority artifact binding
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p attestation-subject

          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "release-authority-artifact-binding-v0" \
            --dir "attestation-subject"

          test -f "attestation-subject/artifact_provenance_binding_v0.json"

          sha256sum "attestation-subject/artifact_provenance_binding_v0.json"

      - name: Attest release authority artifact binding v0
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: attestation-subject/artifact_provenance_binding_v0.json
          show-summary: true

  attest_llamaguard_current_run_summary:
    name: "LlamaGuard current-run summary: attest and verify"
    needs: pulse
    if: ${{ github.event_name != 'pull_request' && needs.pulse.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pinned
        with:
          python-version: "3.11"

      - name: Install Python deps for LlamaGuard attestation envelope
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install jsonschema

      - name: Download current-run LlamaGuard evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          DOWNLOAD_DIR="${RUNNER_TEMP}/llamaguard-current-run"
          CANONICAL_DIR="${GITHUB_WORKSPACE}/PULSE_safe_pack_v0/artifacts/external"

          rm -rf "${DOWNLOAD_DIR}"
          mkdir -p "${DOWNLOAD_DIR}" "${CANONICAL_DIR}"

          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "llamaguard-current-run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --dir "${DOWNLOAD_DIR}"

          for name in \
            llamaguard_raw.jsonl \
            llamaguard_evaluator_manifest_v0.json \
            llamaguard_summary.json
          do
            src="$(find "${DOWNLOAD_DIR}" -type f -name "${name}" | head -n 1 || true)"

            if [[ -z "${src}" ]]; then
              echo "::error::Downloaded LlamaGuard evidence is missing ${name}"
              exit 1
            fi

            if [[ -L "${src}" ]]; then
              echo "::error::Downloaded LlamaGuard evidence must not be a symlink: ${src}"
              exit 1
            fi

            cp "${src}" "${CANONICAL_DIR}/${name}"
          done

          for artifact in \
            "${CANONICAL_DIR}/llamaguard_raw.jsonl" \
            "${CANONICAL_DIR}/llamaguard_evaluator_manifest_v0.json" \
            "${CANONICAL_DIR}/llamaguard_summary.json"
          do
            if [[ ! -f "${artifact}" || -L "${artifact}" ]]; then
              echo "::error::Canonical LlamaGuard evidence is not a regular non-symlink file: ${artifact}"
              exit 1
            fi

            sha256sum "${artifact}"
          done

      - name: Attest canonical LlamaGuard summary
        id: attest_llamaguard_summary
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: PULSE_safe_pack_v0/artifacts/external/llamaguard_summary.json
          show-summary: true

      - name: Build canonical LlamaGuard external-summary envelope
        shell: bash
        run: |
          set -euo pipefail

          PULSE_ATTESTATION_VERIFIED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          PULSE_EXTERNAL_SIGNER_IDENTITY="repo:${GITHUB_REPOSITORY:?}:workflow:.github/workflows/pulse_ci.yml"

          python "${GITHUB_WORKSPACE}/PULSE_safe_pack_v0/tools/build_llamaguard_attestation_envelope_v1.py" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --bundle-source "${{ steps.attest_llamaguard_summary.outputs.bundle-path }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --source-digest "${GITHUB_SHA}" \
            --workflow-ref "${GITHUB_WORKFLOW_REF}" \
            --signer-identity "${PULSE_EXTERNAL_SIGNER_IDENTITY}" \
            --verified-at "${PULSE_ATTESTATION_VERIFIED_AT}" \
            --attestation-id "${{ steps.attest_llamaguard_summary.outputs.attestation-id }}" \
            --attestation-url "${{ steps.attest_llamaguard_summary.outputs.attestation-url }}" \
            --attestation-action-ref "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26"

      - name: Verify canonical LlamaGuard external-summary attestation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          python "${GITHUB_WORKSPACE}/PULSE_safe_pack_v0/tools/check_external_summary_attestation_v1.py" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --summary "PULSE_safe_pack_v0/artifacts/external/llamaguard_summary.json" \
            --envelope "PULSE_safe_pack_v0/artifacts/external/llamaguard_summary.envelope.json" \
            --summary-schema "schemas/external_summary_v1.schema.json" \
            --envelope-schema "schemas/external_summary_envelope_v1.schema.json" \
            --signer-policy "policy/external_signers_v1.yml" \
            --repository "${GITHUB_REPOSITORY}" \
            --source-digest "${GITHUB_SHA}" \
            --out "PULSE_safe_pack_v0/artifacts/external/llamaguard_attestation_verifier_v1.json"

      - name: Upload attested LlamaGuard external evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pinned
        with:
          name: llamaguard-attested-current-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            PULSE_safe_pack_v0/artifacts/external/llamaguard_raw.jsonl
            PULSE_safe_pack_v0/artifacts/external/llamaguard_evaluator_manifest_v0.json
            PULSE_safe_pack_v0/artifacts/external/llamaguard_summary.json
            PULSE_safe_pack_v0/artifacts/external/llamaguard_summary.bundle.json
            PULSE_safe_pack_v0/artifacts/external/llamaguard_summary.envelope.json
            PULSE_safe_pack_v0/artifacts/external/llamaguard_attestation_verifier_v1.json
          if-no-files-found: error
          retention-days: 30
  
  tools-tests:
    name: Tools smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pinned
        with:
          python-version: "3.11"

      - name: Install Python deps (tools-tests)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name:  Run exporter + release-authority smoke tests
        shell: bash
        run: |
          set -euo pipefail

          # tools-tests suite: read from manifest (field source of truth)
          list_file="ci/tools-tests.list"
          if [[ ! -f "${list_file}" ]]; then
            echo "::error::Missing tools-tests manifest: ${list_file}"
            exit 1
          fi

          tests=()
          while IFS= read -r raw; do
            # Strip comments + trim
            line="$(printf '%s' "$raw" | sed -e 's/[[:space:]]*#.*$//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [[ -z "$line" ]] && continue

            # Enforce: one path per line (no internal whitespace)
            if [[ "$line" =~ [[:space:]] ]]; then
              echo "::error::Invalid entry in ${list_file} (expected one path per line): '${raw}'"
              exit 1
            fi

            tests+=("$line")
          done < "${list_file}"

          if [[ "${#tests[@]}" -eq 0 ]]; then
            echo "::error::No tests found in ${list_file} after filtering."
            exit 1
          fi

          echo "tools-tests manifest (${#tests[@]} entries):"
          printf '  - %s\n' "${tests[@]}"

          echo "Fail-fast: py_compile smoke scripts"
          python -m py_compile "${tests[@]}"

          echo "Run smoke scripts (one-by-one for clean logs)"
          for t in "${tests[@]}"; do
            echo "==> python $t"
            python "$t"
          done

          echo "Exporter + release-authority smoke tests OK"

      - name: Run targeted pytest suite
        shell: bash
        run: |
          set -euo pipefail

          list_file="ci/pytest-tests.list"
          if [[ ! -f "${list_file}" ]]; then
            echo "::error::Missing pytest manifest: ${list_file}"
            exit 1
          fi

          tests=()
          declare -A seen=()
          raw=''

          while IFS= read -r raw || [[ -n "${raw:-}" ]]; do
            line="$(printf '%s' "$raw" | sed -e 's/[[:space:]]*#.*$//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [[ -z "$line" ]] && continue

            if [[ "$line" =~ [[:space:]] ]]; then
              echo "::error::Invalid entry in ${list_file} (expected one path per line): '${raw}'"
              exit 1
            fi

            if [[ "$line" != tests/* ]]; then
              echo "::error::Invalid entry in ${list_file} (expected tests/* path): '${line}'"
              exit 1
            fi

            if [[ -n "${seen[$line]+x}" ]]; then
              echo "::error::Duplicate entry in ${list_file}: ${line}"
              exit 1
            fi
            seen["$line"]=1

            if [[ ! -f "$line" ]]; then
              echo "::error::Listed pytest target not found: ${line}"
              exit 1
            fi

            tests+=("$line")
          done < "${list_file}"

          if [[ "${#tests[@]}" -eq 0 ]]; then
            echo "::error::No tests found in ${list_file} after filtering."
            exit 1
          fi

          echo "pytest manifest (${#tests[@]} entries):"
          printf ' - %s\n' "${tests[@]}"

          python -m pytest -q "${tests[@]}"
