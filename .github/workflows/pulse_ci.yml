name: PULSE CI

on:
  push:
    branches: [main]
    tags: ["v*", "V*"]
    paths:
      - "**"
      - "!docs/**"
      - "!**/*.md"
      - "!badges/**"
      - "!reports/**"
      - "docs/policy/CHANGELOG.md"
      - "docs/GLOSSARY_v0.md"
      - "docs/STATUS_CONTRACT.md"
      - "docs/STATE_v0.md"
      - "docs/AMBIGUITY_REGISTER_v0.md"

  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      strict_external_evidence:
        description: "Require external *_summary.json evidence (fail if missing)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default: this workflow must not write to the repo.
permissions:
  contents: read

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    
    env:
      PACK_DIR: ${{ github.workspace }}/PULSE_safe_pack_v0
      REFERENCE_BUNDLE_DIR: ""
 
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ci guard single run_all invocation
        run: python ci/check_single_run_all.py

      - name: Enforce changelog for semantic changes
        shell: bash
        run: |
          set -euo pipefail

          # Determine diff range depending on event type.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          else
            echo "Skipping changelog enforcement: unsupported event '${{ github.event_name }}'."
            exit 0
          fi

          # Handle edge cases (e.g., first commit or unusual events).
          if [[ -z "${BASE}" || "${BASE}" == "0000000000000000000000000000000000000000" ]]; then
            echo "Skipping changelog enforcement: BASE SHA is empty/zero."
            exit 0
          fi

          echo "Changelog enforcement diff range: ${BASE}..${HEAD}"

          CHANGED="$(git diff --name-only "${BASE}" "${HEAD}" || true)"
          echo "${CHANGED}" | sed 's/^/changed: /' || true

          # Files that can change release-gating meaning and therefore require changelog coverage.
          SEMANTIC_PATTERN='^(pulse_gate_policy_v0\.yml|metrics/specs/.*|schemas/dataset_manifest\.schema\.json|examples/dataset_manifest\.example\.json|schemas/status/.*|docs/(GLOSSARY_v0\.md|STATUS_CONTRACT\.md|STATE_v0\.md|AMBIGUITY_REGISTER_v0\.md))$'

          # Changelog file containing semantic change notes.
          CHANGELOG_PATH='docs/policy/CHANGELOG.md'

          # If nothing semantic changed, do nothing.
          SEMANTIC_CHANGED="$(echo "${CHANGED}" | grep -E "${SEMANTIC_PATTERN}" || true)"
          if [[ -z "${SEMANTIC_CHANGED}" ]]; then
            echo "No semantic changes detected; changelog update not required."
            exit 0
          fi

          if [[ ! -f "${CHANGELOG_PATH}" ]]; then
            echo "::error::Changelog not found at ${CHANGELOG_PATH}."
            exit 1
          fi

          export SEMANTIC_CHANGED
          export CHANGELOG_PATH

          python3 - <<'PY'
          import os, re, sys
          from pathlib import Path

          changed = [ln.strip() for ln in os.environ["SEMANTIC_CHANGED"].splitlines() if ln.strip()]
          changelog_path = Path(os.environ["CHANGELOG_PATH"])
          text = changelog_path.read_text(encoding="utf-8", errors="replace")

          # Accept both "## Unreleased" and "## [Unreleased]" (robust, not brittle).
          m = re.search(r"^##\s*\[?\s*Unreleased\s*\]?\s*$([\s\S]*?)(?=^##\s+\S|\Z)", text, flags=re.M | re.I)
          if not m:
            print("::error::docs/policy/CHANGELOG.md is missing an 'Unreleased' section (expected '## Unreleased' or '## [Unreleased]').")
            sys.exit(1)

          unrel = m.group(1)
          unrel_l = unrel.lower()

          def stem_variants(stem: str):
            s = stem.lower()
            s2 = re.sub(r"_v\d+$", "", s)  # drop _v0 suffix (q3_fairness_v0 -> q3_fairness)
            return {
              s,
              s2,
              s2.replace("_", " "),
              s2.replace("_", "-"),
            }

          def parse_spec_id_version(path: Path):
            # Minimal YAML parsing for the spec block: look for top-level "spec:" then id/version inside.
            in_spec = False
            spec_id = None
            spec_ver = None

            for raw in path.read_text(encoding="utf-8", errors="replace").splitlines():
              line = raw.rstrip("\n")

              # enter spec block on exact top-level "spec:"
              if not in_spec and re.match(r"^spec:\s*$", line):
                in_spec = True
                continue

              if in_spec:
                # leaving spec block when another top-level key starts (non-empty and no leading spaces)
                if re.match(r"^[A-Za-z0-9_]+\s*:\s*$", line) and not line.startswith(" "):
                  break

                # capture id and version lines inside spec
                m_id = re.match(r"^\s*id:\s*(.+?)\s*$", line)
                if m_id and spec_id is None:
                  spec_id = m_id.group(1).strip().strip('"').strip("'")
                  continue

                m_ver = re.match(r"^\s*version:\s*(.+?)\s*$", line)
                if m_ver and spec_ver is None:
                  spec_ver = m_ver.group(1).strip().strip('"').strip("'")
                  continue

                if spec_id and spec_ver:
                  break

            return spec_id, spec_ver

          def parse_policy_id_version(path: Path):
            # Minimal YAML parsing for the policy block: look for top-level "policy:" then id/version inside.
            in_policy = False
            pol_id = None
            pol_ver = None

            for raw in path.read_text(encoding="utf-8", errors="replace").splitlines():
              line = raw.rstrip("\n")

              # enter policy block on exact top-level "policy:"
              if not in_policy and re.match(r"^policy:\s*$", line):
                in_policy = True
                continue

              if in_policy:
                # leaving policy block when another top-level key starts (non-empty and no leading spaces)
                if re.match(r"^[A-Za-z0-9_]+\s*:\s*$", line) and not line.startswith(" "):
                  break

                m_id = re.match(r"^\s*id:\s*(.+?)\s*$", line)
                if m_id and pol_id is None:
                  pol_id = m_id.group(1).strip().strip('"').strip("'")
                  continue

                m_ver = re.match(r"^\s*version:\s*(.+?)\s*$", line)
                if m_ver and pol_ver is None:
                  pol_ver = m_ver.group(1).strip().strip('"').strip("'")
                  continue

                if pol_id and pol_ver:
                  break

            return pol_id, pol_ver

          def canonical_doc_tokens(path_str: str):
            stem = Path(path_str).stem.lower()
            if stem == "state_v0":
              return {"state_v0", "state v0", "state-v0"}
            return stem_variants(stem)

          missing = []

          for p in changed:
            if p.startswith("metrics/specs/") and p.endswith(".yml"):
              spec_path = Path(p)
              if not spec_path.exists():
                missing.append((p, "spec file missing in workspace"))
                continue

              spec_id, spec_ver = parse_spec_id_version(spec_path)

              # Fallbacks: use filename stem if spec.id missing (but warn via error).
              file_stem = spec_path.stem.lower()
              want_any = set()

              if spec_id:
                want_any |= stem_variants(spec_id)
              else:
                want_any |= stem_variants(file_stem)

              # Require at least one identifier token AND the version string to appear in Unreleased.
              id_ok = any(tok and tok in unrel_l for tok in want_any)
              ver_ok = (spec_ver is not None) and (str(spec_ver).strip() in unrel)

              if not id_ok or not ver_ok:
                reason = []
                if not id_ok:
                  reason.append(f"missing id token (expected one of: {sorted(want_any)})")
                if spec_ver is None:
                  reason.append("missing spec.version in file")
                elif not ver_ok:
                  reason.append(f"missing version '{spec_ver}' in Unreleased")
                missing.append((p, "; ".join(reason)))
            elif p == "pulse_gate_policy_v0.yml":
              pol_path = Path(p)
              if not pol_path.exists():
                missing.append((p, "policy file missing in workspace"))
                continue

              pol_id, pol_ver = parse_policy_id_version(pol_path)

              if pol_id is None:
                # fallback to file stem
                pol_id = pol_path.stem
              want_any = stem_variants(pol_id)
              id_ok = any(tok and tok in unrel_l for tok in want_any)
              ver_ok = (pol_ver is not None) and (str(pol_ver).strip() in unrel)
              if not id_ok or not ver_ok:
                reason = []
                if not id_ok:
                  reason.append(f"missing policy id token (expected one of: {sorted(want_any)})")
                if pol_ver is None:
                  reason.append("missing policy.version in file")
                elif not ver_ok:
                  reason.append(f"missing version '{pol_ver}' in Unreleased")
                missing.append((p, "; ".join(reason)))
            elif p in ("schemas/dataset_manifest.schema.json", "examples/dataset_manifest.example.json"):
              key = Path(p).stem.replace(".", " ").replace("_", " ").lower()
              if key not in unrel_l:
                missing.append((p, f"missing '{key}' mention in Unreleased"))
            elif p.startswith("schemas/status/") and p.endswith(".json"):
              key = Path(p).stem.replace(".", " ").replace("_", " ").lower()
              if key not in unrel_l:
                missing.append((p, f"missing '{key}' mention in Unreleased"))
            elif p in (
              "docs/GLOSSARY_v0.md",
              "docs/STATUS_CONTRACT.md",
              "docs/STATE_v0.md",
              "docs/AMBIGUITY_REGISTER_v0.md",
            ):
              want_any = canonical_doc_tokens(p)
              if not any(tok and tok in unrel_l for tok in want_any):
                missing.append((p, f"missing doc token (expected one of: {sorted(want_any)})"))

          if missing:
            print("::error::Changelog is missing required Unreleased notes for semantic changes:")
            for p, reason in missing:
              print(f"  - {p}: {reason}")
            sys.exit(1)

          print("Changelog enforcement: OK")
          PY

      - name: Install system deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pinned
        with:
          python-version: "3.11"

      - name: Install Python deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install jsonschema

      - name: Prepare pack dir (workspace)
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$GITHUB_WORKSPACE"
          PACK_DIR="${ROOT}/PULSE_safe_pack_v0"
          echo "PACK_DIR=$PACK_DIR" >> "$GITHUB_ENV"

          if [ ! -d "$PACK_DIR" ]; then
            echo "::error::PACK_DIR not found at $PACK_DIR"
            exit 1
          fi

          echo "PACK_DIR=$PACK_DIR"

      - name: CI pack layout preflight (fail-closed on release-grade)
        id: release_mode
        shell: bash
        run: |
          set -euo pipefail

          PULSE_IS_RELEASE=0
          PULSE_MODE="core"
          PULSE_POLICY_SET="core_required"

          if [[ "${GITHUB_REF:-}" == refs/tags/v* || "${GITHUB_REF:-}" == refs/tags/V* ]]; then
            PULSE_IS_RELEASE=1
            PULSE_MODE="prod"
            PULSE_POLICY_SET="required"
          fi

          if [[ "${GITHUB_EVENT_NAME:-}" == "workflow_dispatch" ]]; then
            STRICT="$(jq -r '.inputs.strict_external_evidence // "false"' "$GITHUB_EVENT_PATH")"
            if [[ "$STRICT" == "true" ]]; then
              PULSE_IS_RELEASE=1
              PULSE_MODE="prod"
              PULSE_POLICY_SET="required"
            fi
          fi

          PULSE_RUN_KEY="GITHUB_RUN_ID=${GITHUB_RUN_ID:?}|GITHUB_RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT:?}|GITHUB_WORKFLOW=${GITHUB_WORKFLOW:?}"

          echo "PULSE_IS_RELEASE=${PULSE_IS_RELEASE}" >> "$GITHUB_ENV"
          echo "PULSE_MODE=${PULSE_MODE}" >> "$GITHUB_ENV"
          echo "PULSE_POLICY_SET=${PULSE_POLICY_SET}" >> "$GITHUB_ENV"
                    echo "PULSE_RUN_KEY=${PULSE_RUN_KEY}" >> "$GITHUB_ENV"
          echo "is_release=${PULSE_IS_RELEASE}" >> "$GITHUB_OUTPUT"

          echo "Computed flags: IS_RELEASE=$PULSE_IS_RELEASE MODE=$PULSE_MODE POLICY_SET=$PULSE_POLICY_SET"

          EXTRA=()
          if (( PULSE_IS_RELEASE )); then
            EXTRA+=(--release-grade)
          fi

          python tools/check_pack_layout.py \
            --pack_dir "${{ env.PACK_DIR }}" \
            "${EXTRA[@]}"

      - name: Run pack gating pipeline
        if: ${{ steps.release_mode.outputs.is_release != '1' }}
        shell: bash
        run: |
          set -euo pipefail
       
          MODE="${PULSE_MODE:-core}"
          echo "Running pack in mode: $MODE"

          python "${{ env.PACK_DIR }}/tools/run_all.py" \
            --mode "$MODE" \
            --pack_dir "${{ env.PACK_DIR }}" \
            --gate_policy "${GITHUB_WORKSPACE}/pulse_gate_policy_v0.yml"

      - name: release-grade reset candidate evidence outputs
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          rm -rf \
            "${PACK_DIR}/artifacts/status.json" \
            "${PACK_DIR}/artifacts/status_baseline.json" \
            "${PACK_DIR}/artifacts/status_summary_baseline.md" \
            "${PACK_DIR}/artifacts/status_summary_baseline.json" \
            "${PACK_DIR}/artifacts/status_summary.md" \
            "${PACK_DIR}/artifacts/status_summary.json" \
            "${PACK_DIR}/artifacts/required_gate_evidence_v0.json" \
            "${PACK_DIR}/artifacts/required_gate_inputs" \
            "${PACK_DIR}/artifacts/required_gate_evidence_logs" \
            "${PACK_DIR}/artifacts/recorded_release_candidates" \
            "${PACK_DIR}/artifacts/recorded_release_candidate_index_v0.json" \
            "${PACK_DIR}/artifacts/release_evidence_input_manifest_v0.json" \
            "${PACK_DIR}/artifacts/recorded_release_evidence_verifier_v0.json" \
            "${PACK_DIR}/artifacts/external/llamaguard_raw.jsonl" \
            "${PACK_DIR}/artifacts/external/llamaguard_evaluator_manifest_v0.json" \
            "${PACK_DIR}/artifacts/external/llamaguard_summary.json" \
            "${PACK_DIR}/artifacts/external/llamaguard_summary.jsonl" \
            "${PACK_DIR}/artifacts/external/llamaguard_summary.envelope.json" \
            "${PACK_DIR}/artifacts/external/llamaguard_summary.bundle.json" \
            "${PACK_DIR}/artifacts/external/llamaguard_summary.attestation.json" \
            "${PACK_DIR}/artifacts/external/llamaguard_attestation_verifier_v1.json"

      - name: release-grade record current-run required-gate evidence
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          python "${PACK_DIR}/tools/run_recorded_required_gate_evaluations_v0.py" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --git-sha "${GITHUB_SHA}" \
            --run-key "${PULSE_RUN_KEY}" \
            --repository "${GITHUB_REPOSITORY}" \
            --release-candidate "${GITHUB_REF_NAME}" \
            --out "${PACK_DIR}/artifacts/required_gate_evidence_v0.json"

      - name: release-grade build non-stubbed prod candidate status
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          python "${PACK_DIR}/tools/build_release_grade_candidate_status_v0.py" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --out "${PACK_DIR}/artifacts/status.json"

      - name: Preserve baseline status.json (pre-augment)
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ env.PACK_DIR }}/artifacts/status.json"
          DST="${{ env.PACK_DIR }}/artifacts/status_baseline.json"

          if [ ! -f "$SRC" ]; then
            echo "::error::status.json not found at $SRC"
            exit 1
          fi

          cp "$SRC" "$DST"
          echo "OK: wrote $DST"

      - name: "ci: schema validate status_baseline.json (status_v1)"
        shell: bash
        run: |
          set -euo pipefail

          STATUS="${{ env.PACK_DIR }}/artifacts/status_baseline.json"
          SCHEMA="$GITHUB_WORKSPACE/schemas/status/status_v1.schema.json"

          python tools/validate_status_schema.py \
            --schema "$SCHEMA" \
            --status "$STATUS"

      - name: "ci: require prod run_mode on release-grade runs"
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true')
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, sys
          p="PULSE_safe_pack_v0/artifacts/status.json"
          s=json.load(open(p,"r",encoding="utf-8"))
          m=(s.get("metrics") or {})
          mode=str(m.get("run_mode","")).lower()
          if mode != "prod":
              print(f"::error::release-grade run requires metrics.run_mode='prod' (got '{mode}')")
              sys.exit(1)
          print("OK: run_mode=prod")
          PY

      - name: release-grade initialize current-run LlamaGuard identity
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          PULSE_CREATED_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          PULSE_RELEASE_CANDIDATE="${GITHUB_REF_NAME:?}"
          PULSE_EXTERNAL_SIGNER_IDENTITY="repo:${GITHUB_REPOSITORY:?}:workflow:.github/workflows/pulse_ci.yml"
          LLAMAGUARD_VERSION="acf7aafa60f0410f8f42b1fa35e077d705892029"

          {
            echo "PULSE_CREATED_UTC=${PULSE_CREATED_UTC}"
            echo "PULSE_RELEASE_CANDIDATE=${PULSE_RELEASE_CANDIDATE}"
            echo "PULSE_EXTERNAL_SIGNER_IDENTITY=${PULSE_EXTERNAL_SIGNER_IDENTITY}"
            echo "LLAMAGUARD_VERSION=${LLAMAGUARD_VERSION}"
          } >> "$GITHUB_ENV"

      - name: release-grade install pinned LlamaGuard runtime
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install \
            --disable-pip-version-check \
            --no-cache-dir \
            -r "${PACK_DIR}/requirements-llamaguard-v0.txt"

          python -m pip check

      - name: release-grade produce current-run LlamaGuard raw evidence
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HOME: ${{ runner.temp }}/huggingface
          HF_HUB_DISABLE_TELEMETRY: "1"
          TOKENIZERS_PARALLELISM: "false"
        run: |
          set -euo pipefail

          python "${PACK_DIR}/tools/run_llamaguard_current_evidence_v0.py" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --dataset "${PACK_DIR}/examples/llamaguard_current_run_cases_v0.jsonl" \
            --raw-out "${PACK_DIR}/artifacts/external/llamaguard_raw.jsonl" \
            --manifest-out "${PACK_DIR}/artifacts/external/llamaguard_evaluator_manifest_v0.json" \
            --manifest-schema "${PACK_DIR}/schemas/llamaguard_evaluator_manifest_v0.schema.json" \
            --model-revision "${LLAMAGUARD_VERSION}" \
            --token-env "HF_TOKEN" \
            --repository "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --run-key "${PULSE_RUN_KEY}" \
            --workflow-ref "${GITHUB_WORKFLOW_REF}" \
            --release-candidate "${PULSE_RELEASE_CANDIDATE}" \
            --created-utc "${PULSE_CREATED_UTC}" \
            --torch-threads 2 \
            --max-new-tokens 20

          for artifact in \
            "${PACK_DIR}/artifacts/external/llamaguard_raw.jsonl" \
            "${PACK_DIR}/artifacts/external/llamaguard_evaluator_manifest_v0.json"
          do
            if [[ ! -f "$artifact" || -L "$artifact" ]]; then
              echo "::error::LlamaGuard producer did not create a regular non-symlink artifact: $artifact"
              exit 1
            fi
          done

      - name: release-grade build canonical LlamaGuard summary
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          python "${PACK_DIR}/tools/adapters/llamaguard_ingest.py" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --in "${PACK_DIR}/artifacts/external/llamaguard_raw.jsonl" \
            --dataset "${PACK_DIR}/examples/llamaguard_current_run_cases_v0.jsonl" \
            --evaluator-manifest "${PACK_DIR}/artifacts/external/llamaguard_evaluator_manifest_v0.json" \
            --out "${PACK_DIR}/artifacts/external/llamaguard_summary.json" \
            --schema "${PACK_DIR}/schemas/external_summary_v1.schema.json" \
            --thresholds "${PACK_DIR}/profiles/external_thresholds.yaml" \
            --run-id "${PULSE_RUN_KEY}" \
            --generated-at "${PULSE_CREATED_UTC}" \
            --release-candidate "${PULSE_RELEASE_CANDIDATE}" \
            --git-sha "${GITHUB_SHA}" \
            --repository "${GITHUB_REPOSITORY}" \
            --signer-identity "${PULSE_EXTERNAL_SIGNER_IDENTITY}" \
            --tool-version "${LLAMAGUARD_VERSION}"

          SUMMARY="${PACK_DIR}/artifacts/external/llamaguard_summary.json"

          if [[ ! -f "$SUMMARY" || -L "$SUMMARY" ]]; then
            echo "::error::Canonical LlamaGuard summary was not created as a regular non-symlink file."
            exit 1
          fi

      - name: release-grade upload current-run LlamaGuard evidence
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: llamaguard-current-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            PULSE_safe_pack_v0/artifacts/external/llamaguard_raw.jsonl
            PULSE_safe_pack_v0/artifacts/external/llamaguard_evaluator_manifest_v0.json
            PULSE_safe_pack_v0/artifacts/external/llamaguard_summary.json
          if-no-files-found: error
          retention-days: 30

      - name: Show main status.json (head)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "----- status.json (head) -----"
          head -n 200 "${{ env.PACK_DIR }}/artifacts/status.json" || true
          echo "-------------------------------"
      
      - name: Compute external evidence list (for snapshot)
        shell: bash
        run: |
          set -euo pipefail
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          EXTERNAL_DIR="${{ env.PACK_DIR }}/artifacts/external"
          SCRIPT="${{ env.PACK_DIR }}/tools/external_evidence_list.py"

          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::SKIP: external_evidence_list.py not found at $SCRIPT (optional)"
            exit 0
          fi
          if [ ! -f "$STATUS" ]; then
            echo "::notice::SKIP: status.json not found at $STATUS; skipping external evidence list (optional)"
            exit 0
          fi

          python "$SCRIPT" \
            --status "$STATUS" \
            --external_dir "$EXTERNAL_DIR"

      - name: Export baseline summary for snapshot (pre-augment)
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="${{ env.PACK_DIR }}/tools/status_to_summary.py"
          STATUS="${{ env.PACK_DIR }}/artifacts/status_baseline.json"
          OUT_MD="${{ env.PACK_DIR }}/artifacts/status_summary_baseline.md"
          OUT_JSON="${{ env.PACK_DIR }}/artifacts/status_summary_baseline.json"

          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::SKIP: status_to_summary.py not found at $SCRIPT (optional)"
            exit 0
          fi
          if [ ! -f "$STATUS" ]; then
            echo "::notice::SKIP: status_baseline.json not found at $STATUS; skipping baseline summary (optional)"
            exit 0
          fi

          python "$SCRIPT" \
            --status "$STATUS" \
            --out_md "$OUT_MD" \
            --out_json "$OUT_JSON"

      - name: Update artifacts for snapshot
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="${{ env.PACK_DIR }}/tools/update_artifacts_for_snapshot.py"
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"

          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::SKIP: update_artifacts_for_snapshot.py not found at $SCRIPT (optional)"
            exit 0
          fi
          if [ ! -f "$STATUS" ]; then
            echo "::notice::SKIP: status.json not found at $STATUS; skipping update_artifacts_for_snapshot (optional)"
            exit 0
          fi

          python "$SCRIPT" \
            --status "$STATUS"

      - name: Write separation overlay and summary
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="${{ env.PACK_DIR }}/tools/compute_separation_phase_overlay_v0.py"
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"

          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::SKIP: compute_separation_phase_overlay_v0.py not found at $SCRIPT (optional)"
            exit 0
          fi
          if [ ! -f "$STATUS" ]; then
            echo "::notice::SKIP: status.json not found at $STATUS; skipping separation overlay (optional)"
            exit 0
          fi

          python "$SCRIPT" \
            --status "$STATUS"

      - name: Show separation-phase overlay
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "----- separation_phase_overlay_v0.md -----"
          cat "${{ env.PACK_DIR }}/artifacts/separation_phase_overlay_v0.md" || true
          echo "-----------------------------------------"

      - name: Write audit-metric summary
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="${{ env.PACK_DIR }}/tools/audit_metric_summary.py"
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"

          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::SKIP: audit_metric_summary.py not found at $SCRIPT (optional)"
            exit 0
          fi
          if [ ! -f "$STATUS" ]; then
            echo "::notice::SKIP: status.json not found at $STATUS; skipping audit-metric summary (optional)"
            exit 0
          fi

          python "$SCRIPT" \
            --status "$STATUS"

      - name: Show audit-metric summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "----- audit_metric_summary.json -----"
          cat "${{ env.PACK_DIR }}/artifacts/audit_metric_summary.json" || true
          echo "-------------------------------------"

      - name: Write refusal-delta summary
        shell: bash
        run: |
          set -euo pipefail
          IS_RELEASE="${PULSE_IS_RELEASE:-0}"

          POLICY="${GITHUB_WORKSPACE}/pulse_gate_policy_v0.yml"
          PAIRS_SCRIPT="${{ env.PACK_DIR }}/tools/policy_to_refusal_pairs.py"
          RD="${{ env.PACK_DIR }}/tools/refusal_delta.py"
          POLCFG="${{ env.PACK_DIR }}/profiles/pulse_policy.yaml"

          OUT="${{ env.PACK_DIR }}/artifacts/refusal_delta_summary.json"
          PAIRS_FILE="${{ env.PACK_DIR }}/examples/refusal_pairs.jsonl"

          if [ ! -f "$RD" ]; then
            if (( IS_RELEASE )); then
              echo "::error::refusal_delta.py not found at $RD"
              exit 1
            fi
            echo "::notice::SKIP: refusal_delta.py not found at $RD; skipping refusal-delta (optional)"
            exit 0
          fi

          if [ ! -f "$POLCFG" ]; then
            if (( IS_RELEASE )); then
              echo "::error::policy config not found at $POLCFG"
              exit 1
            fi
            echo "::notice::SKIP: policy config not found at $POLCFG; skipping refusal-delta (optional)"
            exit 0
          fi

          # 1) Try to derive pairs from policy (preferred if available)
          PAIRS=""
          if [ -f "$PAIRS_SCRIPT" ] && [ -f "$POLICY" ]; then
            PAIRS="$(python "$PAIRS_SCRIPT" --policy "$POLICY" || true)"
          fi

          # 2) Fallback: if the pack ships a pairs file, use it
          if [[ -z "${PAIRS}" && -f "$PAIRS_FILE" ]]; then
            echo "::notice::policy-derived pairs empty; using pairs file: $PAIRS_FILE"
            PAIRS="$PAIRS_FILE"
          fi

          # 3) If still no pairs: release-grade => fail, otherwise => skip
          if [[ -z "${PAIRS}" ]]; then
            if (( IS_RELEASE )); then
              echo "::error::refusal-delta pairs are required on release-grade runs, but no pairs source was found."
              echo "::error::Expected either non-empty output from $PAIRS_SCRIPT (policy: $POLICY) or file $PAIRS_FILE"
              exit 1
            fi
            echo "::notice::SKIP: No refusal-delta pairs available; skipping refusal-delta summary (optional)"
            exit 0
          fi

          # 4) Compute summary
          python "$RD" \
            --pairs "$PAIRS" \
            --out "$OUT" \
            --policy_config "$POLCFG"

          # 5) Postcondition: summary must exist on release-grade runs (fail-closed)
          if [ ! -f "$OUT" ]; then
            if (( IS_RELEASE )); then
              echo "::error::refusal_delta_summary.json was not created at $OUT"
              exit 1
            fi
            echo "::warning::refusal_delta_summary.json missing after refusal-delta run."
          fi

      - name: Show refusal-delta summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "----- refusal_delta_summary.json -----"
          cat "${{ env.PACK_DIR }}/artifacts/refusal_delta_summary.json" || true
          echo "-------------------------------------"

      - name: "Strict external evidence: require external summaries present (pre-augment, fail-closed)"
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true') || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') }}
        shell: bash
        run: |
          set -euo pipefail
          EXT_DIR="${{ env.PACK_DIR }}/artifacts/external"
          python scripts/check_external_summaries_present.py --external_dir "$EXT_DIR" --require_metric_key

      - name: Augment status (external + top-level flags)
        if: ${{ steps.release_mode.outputs.is_release != '1' }}
        shell: bash
        run: |
          set -euo pipefail
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          THRESH="${{ env.PACK_DIR }}/profiles/external_thresholds.yaml"
          EXT_DIR="${{ env.PACK_DIR }}/artifacts/external"

          if [ ! -f "$STATUS" ]; then
            echo "::error::status.json not found at $STATUS"
            exit 1
          fi
          if [ ! -f "$THRESH" ]; then
            echo "::error::external thresholds not found at $THRESH"
            exit 1
          fi

          echo "::group::augment_status.py preflight"

          echo "PWD=$(pwd)"
          echo "GITHUB_REF=${GITHUB_REF:-}"
          echo "GITHUB_SHA=${GITHUB_SHA:-}"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE:-}"
          echo "GIT_SHA=$(git rev-parse HEAD)"

          echo "STATUS=$STATUS"
          echo "THRESH=$THRESH"
          echo "EXT_DIR=$EXT_DIR"

          PACK_DIR_DERIVED="$(dirname "$(dirname "$STATUS")")"
          AUGMENT="${PACK_DIR_DERIVED}/tools/augment_status.py"

          echo "PACK_DIR_DERIVED=$PACK_DIR_DERIVED"
          echo "AUGMENT=$AUGMENT"

          if [ ! -f "$AUGMENT" ]; then
            echo "::error::augment_status.py not found at $AUGMENT"
            exit 1
          fi

          ls -la "$AUGMENT"
          wc -l "$AUGMENT"
          sha256sum "$AUGMENT"

          nl -ba "$AUGMENT" | sed -n '340,370p' || true

          echo "::endgroup::"

          python -m py_compile "$AUGMENT"

          AUGMENT_CMD=(
            python "$AUGMENT"
            --status "$STATUS"
            --thresholds "$THRESH"
            --external_dir "$EXT_DIR"
          )

          if [[ "${PULSE_IS_RELEASE:-0}" == "1" ]]; then
            AUGMENT_CMD+=(--require_external_summaries)
          fi

          "${AUGMENT_CMD[@]}"

      - name: release-grade build verifier-facing candidate envelopes
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          python "${PACK_DIR}/tools/build_recorded_release_candidates_v0.py" \
            --repo-root "${GITHUB_WORKSPACE}"

      - name: release-grade build release-evidence input manifest
        if: ${{ steps.release_mode.outputs.is_release == '1' }}
        shell: bash
        run: |
          set -euo pipefail

          python "${PACK_DIR}/tools/build_release_evidence_input_manifest_v0.py" \
            --repo-root "${GITHUB_WORKSPACE}"
      
      - name: release-grade verify recorded release evidence
        if: ${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true') }}
        shell: bash
        run: |
          set -euo pipefail
          python "${PACK_DIR}/tools/check_recorded_release_evidence_v0.py" \
            --manifest "${PACK_DIR}/artifacts/release_evidence_input_manifest_v0.json" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --out-json "${PACK_DIR}/artifacts/recorded_release_evidence_verifier_v0.json"

      - name: release-grade materialize release-required from verifier
        if: ${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true') }}
        shell: bash
        run: |
          set -euo pipefail
          python "${PACK_DIR}/tools/materialize_release_required_from_verifier_v0.py" \
            --status "${PACK_DIR}/artifacts/status.json" \
            --verifier-report "${PACK_DIR}/artifacts/recorded_release_evidence_verifier_v0.json" \
            --manifest "${PACK_DIR}/artifacts/release_evidence_input_manifest_v0.json" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --policy "${GITHUB_WORKSPACE}/pulse_gate_policy_v0.yml" \
            --registry "${GITHUB_WORKSPACE}/pulse_gate_registry_v0.yml" \
            --out "${PACK_DIR}/artifacts/status.json"
      
      - name: "ci: schema validate status.json (status_v1)"
        shell: bash
        run: |
          set -euo pipefail

          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          SCHEMA="$GITHUB_WORKSPACE/schemas/status/status_v1.schema.json"

          python tools/validate_status_schema.py \
            --schema "$SCHEMA" \
            --status "$STATUS"

      - name: "ci: validate release-grade status contract"
        if: ${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true') }}
        shell: bash
        run: |
          set -euo pipefail

          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          SCHEMA="$GITHUB_WORKSPACE/schemas/status/release_grade_status_v1.schema.json"

          python tools/validate_status_schema.py \
            --schema "$SCHEMA" \
            --status "$STATUS" \
            --max-errors 20
      
      - name: Re-render Quality Ledger from final status
        id: quality_ledger_final_render
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          REPORT="${{ env.PACK_DIR }}/artifacts/report_card.html"

          if [ ! -f "$STATUS" ]; then
            echo "::error::status.json not found at $STATUS"
            exit 1
          fi

          python "${{ env.PACK_DIR }}/tools/render_quality_ledger.py" \
            --status "$STATUS" \
            --out "$REPORT"

          echo "OK: re-rendered Quality Ledger from final status.json"
      
      - name: Export final summary (post-augment)
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="${{ env.PACK_DIR }}/tools/status_to_summary.py"
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"

          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::SKIP: status_to_summary.py not found at $SCRIPT (optional)"
            exit 0
          fi
          if [ ! -f "$STATUS" ]; then
            echo "::notice::SKIP: status.json not found at $STATUS; skipping final summary (optional)"
            exit 0
          fi

          # Default outputs: artifacts/status_summary.md + artifacts/status_summary.json
          python "$SCRIPT" --status "$STATUS"

      - name: "ci: forbid demo status on version tags"
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
        shell: bash
        run: |
          set -euo pipefail
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          if [ ! -f "$STATUS" ]; then
            echo "::error::status.json not found at $STATUS"
            exit 1
          fi
          export STATUS
          python - <<'PY'
          import json, os, sys

          p = os.environ["STATUS"]
          try:
            with open(p, "r", encoding="utf-8") as f:
              s = json.load(f)
          except Exception as e:
            print(f"::error::failed to parse status.json: {e}")
            sys.exit(1)

          v = str(s.get("version", ""))
          if "demo" in v.lower():
            print(f"::error::demo status.version is not allowed on version tags: {v}")
            sys.exit(1)

          print(f"OK: non-demo status.version on tag: {v}")
          PY

      - name: "ci: forbid stubbed status on release-grade runs"
        if: ${{ startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V') || (github.event_name == 'workflow_dispatch' && github.event.inputs.strict_external_evidence == 'true') }}
        shell: bash
        run: |
          set -euo pipefail
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          python ci/check_release_no_stub_status.py --status "$STATUS"
      

      - name: Build release authority manifest (audit-only)
        shell: bash
        run: |
          set -euo pipefail

          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          OUT="${{ env.PACK_DIR }}/artifacts/release_authority_v0.json"
          BUILDER="${{ env.PACK_DIR }}/tools/build_release_authority_manifest_v0.py"
          CHECKER="${{ env.PACK_DIR }}/tools/check_release_authority_manifest_v0.py"
          SCHEMA="${GITHUB_WORKSPACE}/schemas/release_authority_v0.schema.json"
          POLICY="${GITHUB_WORKSPACE}/pulse_gate_policy_v0.yml"
          REGISTRY="${GITHUB_WORKSPACE}/pulse_gate_registry_v0.yml"
          EVALUATOR="${{ env.PACK_DIR }}/tools/check_gates.py"

          AUTH_POLICY_SET="${PULSE_POLICY_SET:-core_required}"
          if [[ "${PULSE_IS_RELEASE:-0}" == "1" ]]; then
            AUTH_POLICY_SET="required+release_required"
          fi

          if [[ ! -f "$STATUS" ]]; then
            echo "::warning::release authority manifest skipped: status.json not found at $STATUS"
            exit 0
          fi

          if [[ ! -f "$BUILDER" || ! -f "$CHECKER" || ! -f "$SCHEMA" ]]; then
            echo "::warning::release authority manifest skipped: builder/checker/schema missing"
            exit 0
          fi

          set +e
          python "$BUILDER" \
            --status "$STATUS" \
            --policy "$POLICY" \
            --registry "$REGISTRY" \
            --evaluator "$EVALUATOR" \
            --policy-set "$AUTH_POLICY_SET" \
            --out "$OUT" \
            --workflow-name "${GITHUB_WORKFLOW:-PULSE CI}" \
            --event-name "${GITHUB_EVENT_NAME:-unknown}" \
            --ref "${GITHUB_REF:-unknown}" \
            --git-sha "${GITHUB_SHA:-0000000000000000000000000000000000000000}"

          BUILD_RC=$?
          set -e

          if [[ "$BUILD_RC" -ne 0 ]]; then
            echo "::warning::release authority manifest build failed; audit sidecar not produced"
            exit 0
          fi

          set +e
          python "$CHECKER" \
            --manifest "$OUT" \
            --schema "$SCHEMA"

          CHECK_RC=$?
          set -e

          if [[ "$CHECK_RC" -ne 0 ]]; then
            echo "::warning::release authority manifest validation failed; audit sidecar is non-normative"
            exit 0
          fi

          echo "OK: release authority manifest audit sidecar ready at $OUT"
    
      - name: Upload release authority manifest (audit-only)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-authority-v0
          path: ${{ env.PACK_DIR }}/artifacts/release_authority_v0.json
          if-no-files-found: warn
          retention-days: 30

      - name: Summarize release authority manifest (audit-only)
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          OUT="${{ env.PACK_DIR }}/artifacts/release_authority_v0.json"

          {
            echo "### Release authority manifest"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Role | Audit / traceability sidecar |"
            echo "| Authority | Non-normative / non-blocking |"
            echo "| CI artifact | \`release-authority-v0\` |"
            echo "| Workspace path | \`$OUT\` |"

            if [[ -f "$OUT" ]]; then
              echo "| Status | Present |"
            else
              echo "| Status | Missing / not produced |"
            fi

            echo
            echo "The release authority manifest records the evidence-policy-evaluator chain for audit."
            echo "It does not change release semantics, gate policy, \`status.json\`, \`check_gates.py\`, or the primary release decision."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Insert release authority manifest section into Quality Ledger (audit-only)
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          REPORT="${{ env.PACK_DIR }}/artifacts/report_card.html"
          MANIFEST="${{ env.PACK_DIR }}/artifacts/release_authority_v0.json"
          TOOL="${{ env.PACK_DIR }}/tools/insert_release_authority_manifest_ledger_section.py"

          if [[ ! -f "$REPORT" ]]; then
            echo "::warning::release authority ledger section skipped: report_card.html not found at $REPORT"
            exit 0
          fi

          if [[ ! -f "$TOOL" ]]; then
            echo "::warning::release authority ledger section skipped: inserter tool not found at $TOOL"
            exit 0
          fi

          set +e
          python "$TOOL" \
            --report "$REPORT" \
            --manifest "$MANIFEST" \
            --href "release_authority_v0.json"

          INSERT_RC=$?
          set -e

          if [[ "$INSERT_RC" -ne 0 ]]; then
            echo "::warning::release authority ledger section insertion failed; Quality Ledger left unchanged"
            exit 0
          fi

          echo "OK: release authority manifest section inserted into Quality Ledger"

      - name: Stage release authority audit bundle (audit-only)
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE="${{ env.PACK_DIR }}/artifacts/release_authority_audit_bundle"
          REPORT="${{ env.PACK_DIR }}/artifacts/report_card.html"
          MANIFEST="${{ env.PACK_DIR }}/artifacts/release_authority_v0.json"
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"

          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE"

          if [[ -f "$REPORT" ]]; then
            cp "$REPORT" "$BUNDLE/report_card.html"
          else
            echo "::warning::release authority audit bundle: report_card.html not found"
          fi

          if [[ -f "$MANIFEST" ]]; then
            cp "$MANIFEST" "$BUNDLE/release_authority_v0.json"
          else
            echo "::warning::release authority audit bundle: release_authority_v0.json not found"
          fi

          if [[ -f "$STATUS" ]]; then
            cp "$STATUS" "$BUNDLE/status.json"
          else
            echo "::warning::release authority audit bundle: status.json not found"
          fi

          {
            echo "### Release authority audit bundle"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Role | Review / traceability bundle |"
            echo "| Authority | Non-normative / non-blocking |"
            echo "| Artifact | \`release-authority-audit-bundle\` |"
            echo "| Workspace path | \`$BUNDLE\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release authority audit bundle (audit-only)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-authority-audit-bundle
          path: ${{ env.PACK_DIR }}/artifacts/release_authority_audit_bundle/
          if-no-files-found: warn
          retention-days: 30

      - name: "ci: enforce gates via check_gates (policy-derived)"
        shell: bash
        run: |
          set -euo pipefail
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"

          if [ ! -f "$STATUS" ]; then
            echo "::error::status.json not found at $STATUS"
            exit 1
          fi

          POLICY_SET="${PULSE_POLICY_SET:-core_required}"

          # Canonical helper (fail-closed, no PyYAML dependency)
          REQ_STR="$(python tools/policy_to_require_args.py \
            --policy pulse_gate_policy_v0.yml \
            --set "$POLICY_SET" \
            --format space)"

          read -r -a REQ <<< "$REQ_STR"

          if (( ${#REQ[@]} == 0 )); then
            echo "::error::derived gate set is empty: ${POLICY_SET}"
            exit 1
          fi

          EFFECTIVE_SET="${POLICY_SET}"

          if [[ "${PULSE_IS_RELEASE:-0}" == "1" ]]; then
            RELEASE_REQ_STR="$(python tools/policy_to_require_args.py \
              --policy pulse_gate_policy_v0.yml \
              --set release_required \
              --format space)"

            read -r -a RELEASE_REQ <<< "$RELEASE_REQ_STR"

            if (( ${#RELEASE_REQ[@]} == 0 )); then
              echo "::error::derived gate set is empty: release_required"
              exit 1
            fi

            REQ+=("${RELEASE_REQ[@]}")
            EFFECTIVE_SET="${POLICY_SET}+release_required"
          fi

          echo "Enforcing materialized gate set: ${EFFECTIVE_SET} (${#REQ[@]} gates)"
          printf '%s\n' "${REQ[@]}" | sed 's/^/ - /'

          python "${{ env.PACK_DIR }}/tools/check_gates.py" \
            --status "$STATUS" \
            --require "${REQ[@]}"

      - name: Gate registry sync check
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_gate_registry_sync.py \
            --status "${{ env.PACK_DIR }}/artifacts/status.json" \
            --registry pulse_gate_registry_v0.yml \
            --emit-stubs

      - name: Policy ↔ registry consistency check
        shell: bash
        run: |
          set -euo pipefail

          python tools/tools/check_policy_registry_consistency.py \
            --registry pulse_gate_registry_v0.yml \
            --policy pulse_gate_policy_v0.yml \
            --sets required

          python tools/tools/check_policy_registry_consistency.py \
            --registry pulse_gate_registry_v0.yml \
            --policy pulse_gate_policy_v0.yml \
            --sets core_required

          python - <<'PY'
          import sys
          import yaml

          with open("pulse_gate_policy_v0.yml", "r", encoding="utf-8") as f:
              pol = yaml.safe_load(f) or {}

          # Canonical schema is gates.*; accept legacy sets.* as fallback.
          gates = pol.get("gates")
          if gates is None and isinstance(pol.get("sets"), dict):
              gates = pol.get("sets")

          if not isinstance(gates, dict):
              print("::error::pulse_gate_policy_v0.yml is missing expected 'gates' mapping (or legacy 'sets' mapping).")
              sys.exit(1)

          core = set(gates.get("core_required") or [])
          req = set(gates.get("required") or [])

          missing = sorted(core - req)
          if missing:
              print("::error::gates.core_required must be a subset of gates.required.")
              for g in missing:
                  print(f"::error::- {g}")
              sys.exit(1)

          print("OK: core_required ⊆ required")
          PY

      - name: Compute stability map
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="${{ env.PACK_DIR }}/tools/compute_stability_map.py"
          STATUS="${{ env.PACK_DIR }}/artifacts/status.json"
          if [ ! -f "$SCRIPT" ]; then
            echo "::notice::SKIP: compute_stability_map.py not found at $SCRIPT (optional)"
            exit 0
          fi
          python "$SCRIPT" --status "$STATUS"

      - name: Render stability map
        shell: bash
